<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Open ledger book with green P&L column -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Left page -->
  <path d="M4 7 C4 7 8 6 15.5 6 L15.5 27 C8 27 4 26 4 26 Z" fill="#1e293b" stroke="#64748b" stroke-width="0.8"/>
  <!-- Right page -->
  <path d="M28 7 C28 7 24 6 16.5 6 L16.5 27 C24 27 28 26 28 26 Z" fill="#1e293b" stroke="#64748b" stroke-width="0.8"/>

  <!-- Spine -->
  <line x1="16" y1="5.5" x2="16" y2="27.5" stroke="#10b981" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Left page: text lines (green tinted labels, red = loss) -->
  <line x1="6" y1="10" x2="13" y2="10" stroke="#059669" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="14" x2="12" y2="14" stroke="#059669" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="18" x2="11" y2="18" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="22" x2="14" y2="22" stroke="#059669" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Right page: P&L values (green = profit, longest at top) -->
  <line x1="19" y1="10" x2="26" y2="10" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="14" x2="24" y2="14" stroke="#34d399" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="18" x2="23" y2="18" stroke="#059669" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="19" y1="22" x2="22" y2="22" stroke="#10b981" stroke-width="1.2" stroke-linecap="round"/>
</svg>
